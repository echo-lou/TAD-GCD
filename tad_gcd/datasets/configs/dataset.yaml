# =============================================================================
# Dataset config for THUMOS14-TAD-GCD
# =============================================================================
#
# This config is designed for:
#
#   datasets/thumos14_tad_gcd.py
#   datasets/builder.py
#
# Typical usage:
#
#   from datasets import build_dataset, build_dataloader
#   import yaml
#
#   with open("configs/dataset.yaml", "r", encoding="utf-8") as f:
#       cfg = yaml.safe_load(f)
#
#   train_loader = build_dataloader(cfg["dataset"], mode="train_labeled")
#
# -----------------------------------------------------------------------------
# Expected project structure:
#
#   project/
#   ├── configs/
#   │   └── dataset.yaml
#   ├── data/
#   │   └── thumos14_tad_gcd_code2114_train50_split0.json
#   ├── datasets/
#   │   ├── __init__.py
#   │   ├── builder.py
#   │   ├── thumos14_tad_gcd.py
#   │   └── build_thumos14_tad_gcd_index_code2114.py
#   └── tools/
#       └── test_dataset.py
#
# -----------------------------------------------------------------------------
# Important TAD-GCD visibility rule:
#
#   train_labeled:
#       only old-class annotations are visible.
#
#   train_unlabeled:
#       annotations must be [].
#
#   test / test_old / test_new:
#       evaluation only.
#
#   Training code must NOT use:
#       - new-class labels
#       - new-class temporal boundaries
#       - new-class names
#       - new-class text prompts
#       - new_label_to_eval_id
#
# =============================================================================


dataset:
  # ---------------------------------------------------------------------------
  # Dataset identity
  # ---------------------------------------------------------------------------
  dataset_name: thumos14_tad_gcd

  # ---------------------------------------------------------------------------
  # Split json
  # ---------------------------------------------------------------------------
  # This file should be generated by:
  #
  #   datasets/build_thumos14_tad_gcd_index_code2114.py
  #
  # Example generation:
  #
  #   python datasets/build_thumos14_tad_gcd_index.py \
  #     --annotation_json /data/ysc/action/thumos14/thumos/annotations/thumos14.json \
  #     --video_dir /data/ysc/action/thumos14/video \
  #     --split_root ./splits \
  #     --data_split 50 \
  #     --split_num 0 \
  #     --output data/thumos14_tad_gcd_code2114_train50_split0.json
  #
  index_json: data/thumos14_tad_gcd_code2114_train50_split0.json

  # ---------------------------------------------------------------------------
  # Feature loading
  # ---------------------------------------------------------------------------
  # Day 3 can first run with load_features=false to check metadata only.
  #
  # Later, set load_features=true after extracting features.
  #
  # Feature file naming convention expected by datasets/thumos14_tad_gcd.py:
  #
  #   feature_dir/
  #     video_validation_0000051.npy
  #     video_test_0000004.npy
  #
  # Supported feature extensions:
  #
  #   .npy
  #   .npz
  #   .pt
  #   .pth
  #   .pkl
  #   .pickle
  #
  feature_dir: /data/ysc/action/thumos14/features/i3d
  feature_ext: .npy

  # false:
  #   return metadata, video_path, feat_path, segments, labels;
  #   feature will be None.
  #
  # true:
  #   load feature tensor T x D.
  #
  load_features: false

  # Feature normalization:
  #
  #   none:
  #       no normalization.
  #
  #   l2:
  #       L2 normalize along feature dimension D.
  #
  #   zscore:
  #       normalize each dimension over temporal axis.
  #
  feature_norm: none

  # ---------------------------------------------------------------------------
  # Returned fields
  # ---------------------------------------------------------------------------
  return_video_path: true
  return_raw_annotations: true

  # ---------------------------------------------------------------------------
  # Strict checks
  # ---------------------------------------------------------------------------
  # strict=true enables:
  #
  #   1. basic split-json integrity check;
  #   2. train_labeled new-class leakage check;
  #   3. train_unlabeled empty-annotation check;
  #   4. test_old / test_new class-type check.
  #
  strict: true

  # allow_missing_video_path:
  #   true  -> useful when only features are used.
  #   false -> require valid video_path.
  #
  allow_missing_video_path: true

  # allow_missing_feature:
  #   true  -> useful for metadata-only debugging or partial features.
  #   false -> require feature files to exist when load_features=true.
  #
  allow_missing_feature: true

  # copy annotation dicts in __getitem__ to avoid accidental in-place mutation.
  copy_annotations: true

  # ---------------------------------------------------------------------------
  # Dataloader
  # ---------------------------------------------------------------------------
  batch_size: 2

  # Optional overrides.
  # If null, builder.py falls back to batch_size.
  train_batch_size: null
  test_batch_size: null

  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null

  # shuffle:
  #   null -> automatically true for train_labeled/train_unlabeled,
  #           false for test/test_old/test_new.
  #   true -> force shuffle.
  #   false -> force no shuffle.
  #
  shuffle: null

  # drop_last:
  #   null -> default false.
  #   true -> drop incomplete batch.
  #   false -> keep incomplete batch.
  #
  drop_last: null


# =============================================================================
# Modes
# =============================================================================
#
# These names are used by:
#
#   build_dataset(cfg["dataset"], mode="train_labeled")
#   build_dataloader(cfg["dataset"], mode="test")
#
# =============================================================================

modes:
  train_labeled:
    description: supervised old-class temporal action detection training
    annotations_visible: old_only
    allow_new_class_information: false
    used_for_training: true

  train_unlabeled:
    description: unlabeled video pool for discovery and unsupervised learning
    annotations_visible: none
    allow_new_class_information: false
    used_for_training: true

  test:
    description: full evaluation split containing old and new annotations
    annotations_visible: old_and_new
    allow_new_class_information: true
    used_for_training: false

  test_old:
    description: old-class-only evaluation subset
    annotations_visible: old_only
    allow_new_class_information: false
    used_for_training: false

  test_new:
    description: new-class-only evaluation subset
    annotations_visible: new_only
    allow_new_class_information: true
    used_for_training: false


# =============================================================================
# Split generation reference
# =============================================================================
#
# These settings are not directly used by datasets/builder.py.
# They record how the current index_json is expected to be generated.
#
# =============================================================================

split_generation:
  builder_script: datasets/build_thumos14_tad_gcd_index_code2114.py

  data_root: /data/ysc/action/thumos14
  annotation_json: /data/ysc/action/thumos14/thumos/annotations/thumos14.json
  video_dir: /data/ysc/action/thumos14/video

  # Code-2114 open-class split root.
  split_root: ./splits

  # Code-2114 supports:
  #
  #   train_50_test_50
  #   train_75_test_25
  #
  data_split: 50

  # Usually 0-9 if all split list files are available.
  split_num: 0

  # Ratio of visible old-class instances in train_labeled.
  # 1.0 means all old-class instances are labeled.
  # 0.5 means class-balanced 50% old-instance labels.
  labeled_ratio: 1.0

  # Unlabeled video policy:
  #
  #   all_train:
  #       all validation/train videos are exposed as unlabeled videos.
  #
  #   complement_labeled:
  #       videos not used by train_labeled.
  #
  #   videos_with_new:
  #       only videos containing hidden new-class instances.
  #
  #   mixed_old_new:
  #       videos containing old or new action instances.
  #
  unlabeled_policy: all_train


# =============================================================================
# Quick commands
# =============================================================================
#
# These commands are documentation only.
#
# =============================================================================

commands:
  generate_split_50_split0: >
    python datasets/build_thumos14_tad_gcd_index.py
    --annotation_json /data/ysc/action/thumos14/thumos/annotations/thumos14.json
    --video_dir /data/ysc/action/thumos14/video
    --split_root ./splits
    --data_split 50
    --split_num 0
    --output data/thumos14_tad_gcd_code2114_train50_split0.json

  test_dataset_metadata_all_modes: >
    python datasets/builder.py
    --index_json data/thumos14_tad_gcd_code2114_train50_split0.json
    --check_all_modes

  test_dataset_feature_mode: >
    python datasets/builder.py
    --index_json data/thumos14_tad_gcd_code2114_train50_split0.json
    --mode train_labeled
    --feature_dir /data/ysc/action/thumos14/features/i3d
    --feature_ext .npy
    --load_features
    --feature_norm l2


# =============================================================================
# Expected checks
# =============================================================================

expected_checks:
  train_labeled:
    num_old_annotations: "> 0"
    num_new_annotations: "== 0"
    leakage: "no new-class labels, boundaries, eval_id"

  train_unlabeled:
    num_annotations: "== 0"
    annotations: "[]"

  test:
    num_old_annotations: "> 0"
    num_new_annotations: "> 0"

  test_old:
    num_old_annotations: "> 0"
    num_new_annotations: "== 0"

  test_new:
    num_old_annotations: "== 0"
    num_new_annotations: "> 0"
